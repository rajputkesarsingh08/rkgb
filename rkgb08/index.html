            /* ---------- HERO ---------- */
            .hero{
                position:relative;
                min-height:100vh;
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                text-align:center;
                padding:140px 20px 100px;
                background:linear-gradient(160deg, rgba(20,40,28,0.55),rgba(15,32,22,0.55)),url('images (2).jpg');
                background-size:cover;
                background-position:center;
                overflow:visible;
            }
  
            .hero::before{
              content:"";
              position:absolute; 
              inset:0;
              background-image:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 60px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 60px);
              opacity:.25;
            }

            .hero-content{ 
              position:relative; 
              z-index:2; 
            }

            
            .hero h1{
                color:#fff;
                font-weight:700;
                font-size:2.8rem;
                margin-bottom:8px;
                letter-spacing:1px;
            }
            
            .hero p.subtitle{
                color:#cfe9d8;
                text-transform:uppercase;
                letter-spacing:3px;
                font-size:.9rem;
                font-weight:600;
                margin-bottom:34px;
            }

            .btn-hero{
                background:var(--accent-green);
                color:#fff;
                border:none;
                padding:12px 28px;
                margin:0 8px 10px;
                border-radius:4px;
                font-weight:500;
                letter-spacing:.5px;
                transition:background .25s ease, transform .2s ease;
                display:inline-block;
            }
  
            .btn-hero:hover{ 
                background:var(--accent-green-hover); color:#fff; transform:translateY(-2px); 
            }

            .btn-hero.outline{
                background:transparent;
                border:1px solid rgba(255,255,255,0.5);
            }

            .btn-hero.outline:hover{ 
                background:rgba(255,255,255,0.1); 
            }

            .social-row{
                position:absolute;
                left:50%;
                bottom:0;
                transform:translate(-50%, 50%);
                z-index:6;
                white-space:nowrap;
            }
  
            .social-row a{
                display:inline-flex;
                align-items:center; justify-content:center;
                width:52px; height:52px;
                border-radius:50%;
                background:#8f9a93;
                color:#fff;
                margin:0 6px;
                font-size:1.15rem;
                box-shadow:0 6px 16px rgba(0,0,0,0.25);
                transition:background .25s ease, transform .2s ease;
            }
  
            .social-row a:hover{ 
                background:var(--accent-green); transform:translateY(-3px); 
            }

            @media (max-width:600px){
                .social-row a{ width:42px; height:42px; font-size:1rem; margin:0 4px; }
            }

        <script>
            AOS.init({ duration: 800, once: true, offset: 60 });
            document.getElementById('year').textContent = new Date().getFullYear();

            // Navbar background on scroll
            const nav = document.getElementById('mainNav');
            window.addEventListener('scroll', () => {
            if (window.scrollY > 40) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');});


            // Mobile nav toggle
            const navToggle = document.getElementById('navToggle');
            const navLinks = document.getElementById('navLinks');
            navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
            navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => navLinks.classList.remove('open'));});
